name: Live Shanghai grade 1 math textbook test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-download:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile and run offline tests
        run: |
          python -m compileall -q scripts tests
          python -m unittest discover -s tests -v

      - name: Check SmartEdu public index
        run: |
          python scripts/china_edu_book.py doctor --network --json | tee /tmp/doctor.json

      - name: Search Shanghai grade-one math textbooks
        run: |
          python scripts/china_edu_book.py search \
            --stage 小学 \
            --grade 一年级 \
            --subject 数学 \
            --version 沪教版 \
            --refresh \
            --limit 50 \
            --json > /tmp/search.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path('/tmp/search.json').read_text(encoding='utf-8'))
          candidates = payload.get('candidates') or []
          if not candidates:
              raise SystemExit('No Shanghai grade-one math textbook candidate was found')

          preferred_markers = ('上册', '第一学期', '第一册')
          selected = next(
              (
                  item for item in candidates
                  if any(marker in str(item.get('volume') or item.get('title') or '') for marker in preferred_markers)
              ),
              candidates[0],
          )
          resource_id = selected.get('resource_id')
          if not resource_id:
              raise SystemExit('Selected candidate has no resource_id')

          summary = {
              'query': {
                  'stage': '小学',
                  'grade': '一年级',
                  'subject': '数学',
                  'version': '沪教版',
              },
              'matched': payload.get('matched'),
              'candidates': [
                  {
                      'resource_id': item.get('resource_id'),
                      'title': item.get('title'),
                      'stage': item.get('stage'),
                      'grade': item.get('grade'),
                      'subject': item.get('subject'),
                      'version': item.get('version'),
                      'volume': item.get('volume'),
                      'provider': item.get('provider'),
                      'source_url': item.get('source_url'),
                  }
                  for item in candidates
              ],
              'selected': {
                  'resource_id': resource_id,
                  'title': selected.get('title'),
                  'version': selected.get('version'),
                  'volume': selected.get('volume'),
                  'source_url': selected.get('source_url'),
              },
          }
          Path('/tmp/search-summary.json').write_text(
              json.dumps(summary, ensure_ascii=False, indent=2),
              encoding='utf-8',
          )
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f"resource_id={resource_id}\n")
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY
        id: select

      - name: Download one selected textbook
        id: download
        continue-on-error: true
        run: |
          set +e
          python scripts/china_edu_book.py download \
            --id "${{ steps.select.outputs.resource_id }}" \
            --output-dir /tmp/shanghai-grade1-math \
            --flat \
            --workers 1 \
            --json > /tmp/download.json 2> /tmp/download.stderr
          status=$?
          set -e
          printf '%s\n' "$status" > /tmp/download-exit-code.txt
          echo "download exit code: $status"
          if [ -s /tmp/download.stderr ]; then
            echo '--- download stderr ---'
            cat /tmp/download.stderr
          fi
          if [ -s /tmp/download.json ]; then
            echo '--- download stdout ---'
            cat /tmp/download.json
          fi
          exit "$status"

      - name: Validate downloaded PDF and remove it
        if: always()
        run: |
          python - <<'PY'
          import hashlib
          import json
          import shutil
          from pathlib import Path

          exit_code_path = Path('/tmp/download-exit-code.txt')
          exit_code = int(exit_code_path.read_text().strip()) if exit_code_path.exists() else 999
          stdout_path = Path('/tmp/download.json')
          stderr_path = Path('/tmp/download.stderr')
          stderr = stderr_path.read_text(encoding='utf-8', errors='replace') if stderr_path.exists() else ''

          search = json.loads(Path('/tmp/search-summary.json').read_text(encoding='utf-8'))
          if exit_code != 0 or not stdout_path.exists() or not stdout_path.read_text(encoding='utf-8').strip():
              report = {
                  'result': 'failed',
                  'search': search,
                  'download': {
                      'exit_code': exit_code,
                      'stderr': stderr[-12000:],
                  },
              }
              Path('/tmp/live-test-report.json').write_text(
                  json.dumps(report, ensure_ascii=False, indent=2),
                  encoding='utf-8',
              )
              print(json.dumps(report, ensure_ascii=False, indent=2))
              shutil.rmtree('/tmp/shanghai-grade1-math', ignore_errors=True)
              raise SystemExit('The skill download command failed; see live-test-report.json')

          payload = json.loads(stdout_path.read_text(encoding='utf-8'))
          files = payload.get('files') or []
          if payload.get('failed') != 0 or len(files) != 1 or not files[0].get('ok'):
              report = {
                  'result': 'failed',
                  'search': search,
                  'download': {
                      'exit_code': exit_code,
                      'payload': payload,
                      'stderr': stderr[-12000:],
                  },
              }
              Path('/tmp/live-test-report.json').write_text(
                  json.dumps(report, ensure_ascii=False, indent=2),
                  encoding='utf-8',
              )
              print(json.dumps(report, ensure_ascii=False, indent=2))
              shutil.rmtree('/tmp/shanghai-grade1-math', ignore_errors=True)
              raise SystemExit('The skill reported a failed download; see live-test-report.json')

          item = files[0]
          path = Path(item['path'])
          if not path.is_file():
              raise SystemExit(f'Downloaded file does not exist: {path}')
          data_prefix = path.read_bytes()[:5]
          if data_prefix != b'%PDF-':
              raise SystemExit(f'Invalid PDF signature: {data_prefix!r}')
          size = path.stat().st_size
          if size < 10_000:
              raise SystemExit(f'PDF is unexpectedly small: {size} bytes')

          digest = hashlib.sha256()
          with path.open('rb') as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b''):
                  digest.update(chunk)
          sha256 = digest.hexdigest()
          if sha256 != item.get('sha256'):
              raise SystemExit('SHA-256 reported by the skill does not match the downloaded file')

          report = {
              'result': 'passed',
              'search': search,
              'download': {
                  'resource_id': item.get('resource_id'),
                  'title': item.get('title'),
                  'size': size,
                  'sha256': sha256,
                  'pdf_signature': '%PDF-',
                  'auth_configured': payload.get('auth_configured'),
              },
          }
          Path('/tmp/live-test-report.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2),
              encoding='utf-8',
          )
          print(json.dumps(report, ensure_ascii=False, indent=2))

          shutil.rmtree('/tmp/shanghai-grade1-math', ignore_errors=True)
          if path.exists():
              raise SystemExit('Downloaded PDF was not removed after validation')
          PY

      - name: Upload test report only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shanghai-grade1-math-live-test-report
          path: |
            /tmp/doctor.json
            /tmp/search-summary.json
            /tmp/download.json
            /tmp/download.stderr
            /tmp/download-exit-code.txt
            /tmp/live-test-report.json
          if-no-files-found: warn
          retention-days: 1
